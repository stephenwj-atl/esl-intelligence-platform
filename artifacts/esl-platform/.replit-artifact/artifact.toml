kind = "web"
previewPath = "/"
title = "ESL Intelligence Platform"
version = "1.0.0"
id = "artifacts/esl-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20506

[services.development]
run = "pnpm --filter @workspace/esl-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/esl-platform", "run", "build" ]
publicDir = "artifacts/esl-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20506"
BASE_PATH = "/"
