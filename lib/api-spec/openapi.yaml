openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: ESL Environmental Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project operations
  - name: portfolio
    description: Portfolio analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectWithAnalysis"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create and analyze a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Project created with analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWithAnalysis"
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with full analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project with analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWithAnalysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{id}/scenario:
    post:
      operationId: runScenario
      tags: [projects]
      summary: Run what-if scenario analysis on a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioInput"
      responses:
        "200":
          description: Scenario comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio-level summary metrics
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"
  /portfolio/optimize:
    get:
      operationId: getPortfolioOptimization
      tags: [portfolio]
      summary: Get portfolio optimization recommendations
      responses:
        "200":
          description: Optimization recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioOptimization"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    CreateProjectInput:
      type: object
      required:
        - name
        - country
        - projectType
        - investmentAmount
        - floodRisk
        - coastalExposure
        - contaminationRisk
        - regulatoryComplexity
        - communitySensitivity
        - waterStress
      properties:
        name:
          type: string
        country:
          type: string
          default: Jamaica
        projectType:
          type: string
          enum: [Solar, Port, Hotel, Industrial, Agriculture]
        investmentAmount:
          type: number
          description: Investment amount in millions USD
        floodRisk:
          type: number
          minimum: 0
          maximum: 10
        coastalExposure:
          type: number
          minimum: 0
          maximum: 10
        contaminationRisk:
          type: number
          minimum: 0
          maximum: 10
        regulatoryComplexity:
          type: number
          minimum: 0
          maximum: 10
        communitySensitivity:
          type: number
          minimum: 0
          maximum: 10
        waterStress:
          type: number
          minimum: 0
          maximum: 10
        hasLabData:
          type: boolean
          default: false
        hasMonitoringData:
          type: boolean
          default: false
        isIFCAligned:
          type: boolean
          default: false
    RiskScores:
      type: object
      required:
        - environmentalRisk
        - infrastructureRisk
        - humanExposureRisk
        - regulatoryRisk
        - dataConfidence
        - overallRisk
      properties:
        environmentalRisk:
          type: number
        infrastructureRisk:
          type: number
        humanExposureRisk:
          type: number
        regulatoryRisk:
          type: number
        dataConfidence:
          type: number
        overallRisk:
          type: number
    FinancialRisk:
      type: object
      required:
        - delayRiskPercent
        - costOverrunPercent
        - covenantBreachPercent
        - reputationalRisk
      properties:
        delayRiskPercent:
          type: number
        costOverrunPercent:
          type: number
        covenantBreachPercent:
          type: number
        reputationalRisk:
          type: string
          enum: [Low, Medium, High]
    Decision:
      type: object
      required:
        - outcome
        - insight
      properties:
        outcome:
          type: string
          enum: [PROCEED, CONDITION, DECLINE]
        conditions:
          type: array
          items:
            type: string
        insight:
          type: string
    ProjectWithAnalysis:
      type: object
      required:
        - id
        - name
        - country
        - projectType
        - investmentAmount
        - inputs
        - riskScores
        - financialRisk
        - decision
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        projectType:
          type: string
        investmentAmount:
          type: number
        inputs:
          type: object
          required:
            - floodRisk
            - coastalExposure
            - contaminationRisk
            - regulatoryComplexity
            - communitySensitivity
            - waterStress
            - hasLabData
            - hasMonitoringData
            - isIFCAligned
          properties:
            floodRisk:
              type: number
            coastalExposure:
              type: number
            contaminationRisk:
              type: number
            regulatoryComplexity:
              type: number
            communitySensitivity:
              type: number
            waterStress:
              type: number
            hasLabData:
              type: boolean
            hasMonitoringData:
              type: boolean
            isIFCAligned:
              type: boolean
        riskScores:
          $ref: "#/components/schemas/RiskScores"
        financialRisk:
          $ref: "#/components/schemas/FinancialRisk"
        decision:
          $ref: "#/components/schemas/Decision"
        createdAt:
          type: string
          format: date-time
    ScenarioInput:
      type: object
      properties:
        floodRisk:
          type: number
          minimum: 0
          maximum: 10
        coastalExposure:
          type: number
          minimum: 0
          maximum: 10
        contaminationRisk:
          type: number
          minimum: 0
          maximum: 10
        regulatoryComplexity:
          type: number
          minimum: 0
          maximum: 10
        communitySensitivity:
          type: number
          minimum: 0
          maximum: 10
        waterStress:
          type: number
          minimum: 0
          maximum: 10
        hasLabData:
          type: boolean
        hasMonitoringData:
          type: boolean
        isIFCAligned:
          type: boolean
    ScenarioResult:
      type: object
      required:
        - before
        - after
      properties:
        before:
          type: object
          required:
            - riskScores
            - financialRisk
            - decision
          properties:
            riskScores:
              $ref: "#/components/schemas/RiskScores"
            financialRisk:
              $ref: "#/components/schemas/FinancialRisk"
            decision:
              $ref: "#/components/schemas/Decision"
        after:
          type: object
          required:
            - riskScores
            - financialRisk
            - decision
          properties:
            riskScores:
              $ref: "#/components/schemas/RiskScores"
            financialRisk:
              $ref: "#/components/schemas/FinancialRisk"
            decision:
              $ref: "#/components/schemas/Decision"
    PortfolioSummary:
      type: object
      required:
        - totalCapital
        - avgRisk
        - exposureAtRisk
        - avgConfidence
        - projectCount
        - proceedCount
        - conditionCount
        - declineCount
        - riskDistribution
        - capitalByRiskLevel
        - alerts
      properties:
        totalCapital:
          type: number
        avgRisk:
          type: number
        exposureAtRisk:
          type: number
        avgConfidence:
          type: number
        projectCount:
          type: integer
        proceedCount:
          type: integer
        conditionCount:
          type: integer
        declineCount:
          type: integer
        riskDistribution:
          type: array
          items:
            type: object
            required:
              - bucket
              - count
            properties:
              bucket:
                type: string
              count:
                type: integer
        capitalByRiskLevel:
          type: object
          required:
            - low
            - medium
            - high
          properties:
            low:
              type: number
            medium:
              type: number
            high:
              type: number
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/RiskAlert"
    RiskAlert:
      type: object
      required:
        - projectId
        - projectName
        - riskScore
        - confidence
        - investmentAmount
        - issue
        - action
      properties:
        projectId:
          type: integer
        projectName:
          type: string
        riskScore:
          type: number
        confidence:
          type: number
        investmentAmount:
          type: number
        issue:
          type: string
        action:
          type: string
    PortfolioOptimization:
      type: object
      required:
        - currentPortfolioRisk
        - optimizedPortfolioRisk
        - riskReductionPercent
        - recommendations
      properties:
        currentPortfolioRisk:
          type: number
        optimizedPortfolioRisk:
          type: number
        riskReductionPercent:
          type: number
        recommendations:
          type: array
          items:
            type: object
            required:
              - projectId
              - projectName
              - action
              - detail
              - riskImpact
            properties:
              projectId:
                type: integer
              projectName:
                type: string
              action:
                type: string
                enum: [reduce_exposure, increase_allocation, require_mitigation]
              detail:
                type: string
              riskImpact:
                type: number
